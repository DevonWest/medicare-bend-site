# Build and deploy the Medicare in Bend site container to Google Cloud Run.
#
# Targets the BEND project only:
#   - project:      medicare-bend-site
#   - prod service: medicare-bend-site        (https://www.medicareinbend.com)
#   - beta service: medicare-bend-site-beta   (https://beta.medicareinbend.com)
#   - region:       us-west1
# A guard step refuses to deploy if any resolved target references the prior
# Spokane project/service.
#
# Triggers
#   - push to main             → deploys BETA, but ONLY when the repo variable
#                                DEPLOY_ENABLED == "true" (an explicit opt-in so
#                                merging code never auto-deploys before the
#                                Google Cloud project is set up and approved).
#   - manual workflow_dispatch → choose beta or production (production is never
#                                deployed automatically — it always requires a
#                                deliberate manual dispatch).
#
# CRM
#   - Production sets CRM_API_BASE_URL and injects CRM_API_KEY from Secret
#     Manager (secret: crm-prod-api-key). Beta omits both by default, so beta
#     lead submissions report crmSyncStatus: "skipped".
#   - The CRM_API_KEY value is NEVER stored in the repo, image, logs, or env
#     block — only referenced by secret name.
#
# Required GitHub repository Variables:
#   GCP_PROJECT_ID=medicare-bend-site
#   GCP_REGION=us-west1
#   ARTIFACT_REGISTRY_REPO=web
#   CLOUD_RUN_SERVICE=medicare-bend-site
#   CLOUD_RUN_SERVICE_BETA=medicare-bend-site-beta
#   FIREBASE_PROJECT_ID=medicare-bend-site
#   RUNTIME_SERVICE_ACCOUNT=cloud-run-runtime@medicare-bend-site.iam.gserviceaccount.com
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#   GCP_DEPLOY_SERVICE_ACCOUNT=github-deployer@medicare-bend-site.iam.gserviceaccount.com
#   DEPLOY_ENABLED   (set to "true" to allow push-to-main beta deploys)
#   NEXT_PUBLIC_GTM_ID   (optional)
#
# Required Secret Manager secret (production): crm-prod-api-key
# See docs/bend-environment.md and docs/deploy-beta-checklist.md for the full
# setup runbook. Nothing here creates cloud resources or DNS.

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - production

concurrency:
  group: deploy-cloud-run-${{ github.ref }}-${{ github.event.inputs.target || 'beta' }}
  cancel-in-progress: false

jobs:
  ci:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

      - name: Build sanity check
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://www.medicareinbend.com
          NEXT_PUBLIC_SITE_ENV: production
          NEXT_PUBLIC_GTM_ID: ${{ vars.NEXT_PUBLIC_GTM_ID }}

      - name: Deployment sanity checks (Bend-only)
        run: |
          set -euo pipefail
          SITEMAP="$(find .next -name 'sitemap.xml.body' | head -n1)"
          test -n "$SITEMAP" || { echo "::error::sitemap was not generated"; exit 1; }
          grep -q "https://www.medicareinbend.com" "$SITEMAP" \
            || { echo "::error::sitemap does not use https://www.medicareinbend.com"; exit 1; }
          grep -q "/medicare-bend</loc>" "$SITEMAP" \
            || { echo "::error::sitemap is missing the /medicare-bend local page"; exit 1; }
          if grep -qiE "medicareinspokane|spokane|/zip/|/directory/|health-insurance" "$SITEMAP"; then
            echo "::error::sitemap contains a forbidden Spokane/ZIP/directory/health-insurance URL"; exit 1
          fi
          test -f app/healthz/route.ts || { echo "::error::/healthz route is missing"; exit 1; }
          echo "Sanity checks passed: sitemap is Bend-only and /healthz exists."

  deploy:
    name: Build image and deploy to Cloud Run
    needs: ci
    runs-on: ubuntu-latest

    # Safety gate: an automatic (push-to-main) deploy runs ONLY when the owner
    # has explicitly opted in via the DEPLOY_ENABLED repo variable. A manual
    # workflow_dispatch is always allowed because it is itself a deliberate act.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true' }}

    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      AR_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO }}
      RUNTIME_SA: ${{ vars.RUNTIME_SERVICE_ACCOUNT }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      TARGET: ${{ github.event.inputs.target || 'beta' }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve target config
        id: cfg
        run: |
          set -euo pipefail
          if [ "$TARGET" = "production" ]; then
            echo "service=${{ vars.CLOUD_RUN_SERVICE }}" >> "$GITHUB_OUTPUT"
            echo "site_url=https://www.medicareinbend.com" >> "$GITHUB_OUTPUT"
            echo "site_env=production" >> "$GITHUB_OUTPUT"
            # Production syncs to the live CRM. The API key is injected from
            # Secret Manager below (never stored here).
            echo "crm_base_url=https://crm-prod-910764532297.us-west1.run.app" >> "$GITHUB_OUTPUT"
            echo "crm_secrets=CRM_API_KEY=crm-prod-api-key:latest" >> "$GITHUB_OUTPUT"
          else
            echo "service=${{ vars.CLOUD_RUN_SERVICE_BETA }}" >> "$GITHUB_OUTPUT"
            echo "site_url=https://beta.medicareinbend.com" >> "$GITHUB_OUTPUT"
            echo "site_env=beta" >> "$GITHUB_OUTPUT"
            # Beta does NOT sync to the CRM by default → crmSyncStatus: "skipped".
            echo "crm_base_url=" >> "$GITHUB_OUTPUT"
            echo "crm_secrets=" >> "$GITHUB_OUTPUT"
          fi

          echo "image=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/site-${TARGET}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Validate required variables
        run: |
          test -n "${{ env.PROJECT_ID }}" || (echo "::error::GCP_PROJECT_ID is missing" && exit 1)
          test -n "${{ env.REGION }}" || (echo "::error::GCP_REGION is missing" && exit 1)
          test -n "${{ env.AR_REPO }}" || (echo "::error::ARTIFACT_REGISTRY_REPO is missing" && exit 1)
          test -n "${{ env.RUNTIME_SA }}" || (echo "::error::RUNTIME_SERVICE_ACCOUNT is missing" && exit 1)
          test -n "${{ env.FIREBASE_PROJECT_ID }}" || (echo "::error::FIREBASE_PROJECT_ID is missing" && exit 1)
          test -n "${{ steps.cfg.outputs.service }}" || (echo "::error::Cloud Run service variable is missing" && exit 1)
          test -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" || (echo "::error::GCP_WORKLOAD_IDENTITY_PROVIDER is missing" && exit 1)
          test -n "${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}" || (echo "::error::GCP_DEPLOY_SERVICE_ACCOUNT is missing" && exit 1)

      - name: Guard against deploying to the prior (Spokane) project or services
        env:
          SERVICE: ${{ steps.cfg.outputs.service }}
          DEPLOY_SA: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          for value in "$PROJECT_ID" "$FIREBASE_PROJECT_ID" "$SERVICE" "$RUNTIME_SA" "$DEPLOY_SA"; do
            case "$value" in
              *spokane*|*medicareinspokane*)
                echo "::error::Refusing to deploy: '$value' references the prior Spokane project/service."
                exit 1
                ;;
            esac
          done
          echo "Confirmed: target project and services are Bend-only."

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build container image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SITE_URL='${{ steps.cfg.outputs.site_url }}' \
            --build-arg NEXT_PUBLIC_SITE_ENV='${{ steps.cfg.outputs.site_env }}' \
            --build-arg NEXT_PUBLIC_GTM_ID='${{ vars.NEXT_PUBLIC_GTM_ID }}' \
            -t "${{ steps.cfg.outputs.image }}" \
            .

      - name: Push container image
        run: docker push "${{ steps.cfg.outputs.image }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ steps.cfg.outputs.service }}
          region: ${{ env.REGION }}
          image: ${{ steps.cfg.outputs.image }}
          # CRM_API_KEY is bound from Secret Manager (crm-prod-api-key) — never
          # stored in the repo, image, env block, or logs. Empty on beta.
          secrets: ${{ steps.cfg.outputs.crm_secrets }}
          flags: >-
            --service-account=${{ env.RUNTIME_SA }}
            --allow-unauthenticated
            --port=8080
            --cpu=1
            --memory=512Mi
            --min-instances=0
            --max-instances=10
          # CRM_API_BASE_URL is empty on beta → the app treats it as unset and
          # reports crmSyncStatus: "skipped". No secret values appear here.
          env_vars: |
            NEXT_PUBLIC_SITE_URL=${{ steps.cfg.outputs.site_url }}
            NEXT_PUBLIC_SITE_ENV=${{ steps.cfg.outputs.site_env }}
            NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID }}
            FIREBASE_PROJECT_ID=${{ env.FIREBASE_PROJECT_ID }}
            CRM_API_BASE_URL=${{ steps.cfg.outputs.crm_base_url }}
            NODE_ENV=production

      - name: Show service URL
        run: |
          echo "Deployed target: $TARGET"
          gcloud run services describe "${{ steps.cfg.outputs.service }}" \
            --region "$REGION" \
            --format='value(status.url)'
